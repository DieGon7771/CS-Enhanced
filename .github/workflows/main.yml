name: Build Real CloudStream APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk-version: '25.1.8937393'
        cmake-version: '3.22.1'
        
    - name: Accept licenses
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
        
    - name: Grant gradlew permission
      run: chmod +x gradlew
      
    - name: Debug project structure
      run: |
        echo "=== CLOUDSTREAM STRUCTURE ==="
        ls -la
        echo ""
        echo "=== MODULES ==="
        find . -name "build.gradle*" -type f | head -10
        
    - name: Build CloudStream APK
      run: |
        echo "Building CloudStream..."
        
        # CloudStream usa Kotlin Multiplatform, build speciale
        ./gradlew :app:assembleDebug --no-daemon --stacktrace
        
        echo "Build completed!"
        
    - name: Find generated APK
      run: |
        echo "=== SEARCHING FOR REAL APK ==="
        
        # Cerca APK vere (file binari, non testo)
        find . -name "*.apk" -type f -size +1M 2>/dev/null | while read file; do
          echo "📦 Found REAL APK: $file"
          ls -lh "$file"
          echo "File type:"
          file "$file"
          echo ""
        done
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ MAIN APK FOUND: app/build/outputs/apk/debug/app-debug.apk"
        else
          echo "⚠️ Standard APK not found, checking alternatives..."
          # CloudStream potrebbe metterle altrove
          find . -path "*/outputs/*" -name "*.apk" 2>/dev/null
        fi
        
    - name: Upload REAL APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudStream-Real-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/
          */build/outputs/apk/**/*.apk
        if-no-files-found: error
        retention-days: 30
        
    - name: Create backup placeholder (if build fails)
      if: failure()
      run: |
        echo "Build failed, creating diagnostic placeholder..."
        mkdir -p diagnostic-apk
        echo "CLOUDSTREAM BUILD FAILED" > diagnostic-apk/error.txt
        echo "Check logs above for compilation errors" >> diagnostic-apk/error.txt
        echo "Project: CS-Enhanced" >> diagnostic-apk/error.txt
        echo "Date: $(date)" >> diagnostic-apk/error.txt
        # Rinomina in .apk per l'upload
        mv diagnostic-apk/error.txt diagnostic-apk/diagnostic.apk
        
    - name: Upload diagnostic info
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Diagnostics
        path: diagnostic-apk/diagnostic.apk
